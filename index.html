<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EkoPlan — Ekologik Hayot Tarzi</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-wrap { width: 100%; max-width: 420px; padding: 20px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 52px; display: block; margin-bottom: 10px; }
    .logo-title { font-size: 28px; font-weight: 800; color: var(--green); }
    .logo-sub { font-size: 14px; color: var(--text2); margin-top: 4px; }
    .auth-tabs { display: flex; background: var(--bg3); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 24px; }
    .auth-tab {
      flex: 1; text-align: center; padding: 8px; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: 500;
      color: var(--text2); transition: all 0.2s;
    }
    .auth-tab.active { background: var(--green2); color: #0f1a0f; }
    .auth-form { display: none; }
    .auth-form.show { display: block; }
    .divider-text { text-align: center; color: var(--text2); font-size: 12px; margin: 16px 0; position: relative; }
    .divider-text::before, .divider-text::after {
      content: ''; position: absolute; top: 50%; width: 40%; height: 1px;
      background: var(--border);
    }
    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }
    .features { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .feature { background: var(--bg3); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; gap: 10px; }
    .feature-icon { font-size: 20px; }
    .feature-text { font-size: 12px; color: var(--text2); }
    .feature-text strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="logo">
      <span class="logo-icon">🌿</span>
      <div class="logo-title">EkoPlan</div>
      <div class="logo-sub">Ekologik hayot tarzi planeri</div>
    </div>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">🌡️</span>
        <div class="feature-text"><strong>CO₂ Hisob</strong>Kunlik iz kuzat</div>
      </div>
      <div class="feature">
        <span class="feature-icon">✅</span>
        <div class="feature-text"><strong>Eko Vazifalar</strong>Har kuni challenge</div>
      </div>
      <div class="feature">
        <span class="feature-icon">📊</span>
        <div class="feature-text"><strong>Progress</strong>Ball va streak</div>
      </div>
      <div class="feature">
        <span class="feature-icon">🔥</span>
        <div class="feature-text"><strong>Streak</strong>Ketma-ket kunlar</div>
      </div>
    </div>

    <div class="card">
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Kirish</div>
        <div class="auth-tab" onclick="switchTab('register')">Ro'yxat</div>
      </div>

      <div id="msg"></div>

      <!-- Login -->
      <div id="login-form" class="auth-form show">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="l-email" placeholder="email@example.com"/>
        </div>
        <div class="input-group">
          <label>Parol</label>
          <input type="password" id="l-pass" placeholder="••••••••"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="login()">Kirish</button>
      </div>

      <!-- Register -->
      <div id="register-form" class="auth-form">
        <div class="input-group">
          <label>To'liq ism</label>
          <input type="text" id="r-name" placeholder="Ism Familiya"/>
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="r-email" placeholder="email@example.com"/>
        </div>
        <div class="input-group">
          <label>Parol</label>
          <input type="password" id="r-pass" placeholder="Kamida 6 ta belgi"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="register()">Ro'yxatdan o'tish</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    // Check if already logged in
    (async () => {
      const { data: { session } } = await _sb.auth.getSession();
      if (session) location.href = 'dashboard.html';
    })();

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('login-form').classList.toggle('show', tab === 'login');
      document.getElementById('register-form').classList.toggle('show', tab === 'register');
      document.getElementById('msg').innerHTML = '';
    }

    function showMsg(txt, type) {
      document.getElementById('msg').innerHTML = '<div class="alert alert-' + type + '">' + txt + '</div>';
    }

    async function login() {
      const email = document.getElementById('l-email').value.trim();
      const pass = document.getElementById('l-pass').value;
      if (!email || !pass) return showMsg('Email va parolni kiriting', 'error');
      const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
      if (error) return showMsg(error.message, 'error');
      location.href = 'dashboard.html';
    }

    async function register() {
      const name = document.getElementById('r-name').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const pass = document.getElementById('r-pass').value;
      if (!name || !email || !pass) return showMsg('Barcha maydonlarni to\'ldiring', 'error');
      if (pass.length < 6) return showMsg('Parol kamida 6 ta belgi', 'error');
      const { error } = await _sb.auth.signUp({
        email, password: pass,
        options: { data: { full_name: name } }
      });
      if (error) return showMsg(error.message, 'error');
      showMsg('Ro\'yxatdan o\'tdingiz! Emailni tasdiqlang', 'success');
    }
  </script>
</body>
</html>
